# Central configuration. Env overrides: S3_BUCKET, AWS_REGION, KAFKA_BOOTSTRAP_SERVERS, etc.
#
# Single S3 bucket — separate prefixes (no second bucket):
#   raw/        — PDF uploads (storage.s3_raw_prefix)
#   processed/  — extraction JSON (s3_output.processed_prefix)
#   ingest/     — pipeline audit (s3_output.ingest_prefix)
#   feedback/   — feedback events (s3_output.feedback_prefix)

app:
  host: "0.0.0.0"
  port: 8000
  data_dir: "./data"

storage:
  backend: "local"  # local | s3  (s3 requires storage.s3_bucket or env S3_BUCKET)
  local_raw_prefix: "raw"
  local_processed_prefix: "processed"
  # Default bucket (override with env S3_BUCKET). Legacy: S3_OUTPUT_BUCKET / S3_INPUT_BUCKET still work.
  s3_bucket: "doc-flow-bucket"
  s3_raw_prefix: "raw"
  s3_processed_prefix: "processed"

# Prefixes inside the same bucket as storage.s3_bucket / S3_BUCKET
s3_output:
  bucket: ""  # optional duplicate of s3_bucket for YAML-only setups; prefer storage.s3_bucket
  processed_prefix: "processed"
  feedback_prefix: "feedback"
  ingest_prefix: "ingest"

kafka:
  bootstrap_servers: "localhost:9092"
  topic_document_uploads: "document_uploads"
  topic_processed_documents: "processed_documents"
  topic_feedback_events: "feedback_events"

mlflow:
  tracking_uri: "http://localhost:5000"
  experiment_name: "document-intelligence"
  registered_model_name: "doc_type_classifier"

spark:
  master: "local[*]"
  app_name: "DocumentIntelligenceStream"

ocr:
  tesseract_cmd: ""
  language: "eng"

training:
  model_dir: "./data/models"
  min_feedback_samples: 5
