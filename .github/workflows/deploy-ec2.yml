# Deploy to EC2 after a quick verify step (push to main).
#
# Secrets (Settings → Secrets and variables → Actions):
#   EC2_HOST, EC2_USERNAME, EC2_SSH_PRIVATE_KEY  (required)
#   EC2_DEPLOY_PATH, EC2_SSH_PORT, EC2_DOCKER_ENV  (optional)
#
# EC2_DOCKER_ENV: multiline secret, e.g.
#   S3_BUCKET=my-docflow-bucket
#   AWS_REGION=eu-north-1
# Written to $REPO/docker/.env before docker compose (chmod 600).
#
# EC2 must have a real git clone at EC2_DEPLOY_PATH (not a copied folder — need .git).
# One-time on the server: git clone https://github.com/OWNER/REPO.git ~/document-intelligence-system

name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-ec2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt
      - run: pip install -r requirements.txt
      - run: PYTHONPATH=. python -m compileall -q .

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    env:
      DEPLOY_PATH: ${{ secrets.EC2_DEPLOY_PATH }}
      EC2_USER_FOR_PATH: ${{ secrets.EC2_USERNAME }}
      EC2_DOCKER_ENV: ${{ secrets.EC2_DOCKER_ENV }}

    steps:
      - name: Check required secrets
        run: |
          missing=
          [ -z "${{ secrets.EC2_HOST }}" ] && missing="$missing EC2_HOST"
          [ -z "${{ secrets.EC2_USERNAME }}" ] && missing="$missing EC2_USERNAME"
          [ -z "${{ secrets.EC2_SSH_PRIVATE_KEY }}" ] && missing="$missing EC2_SSH_PRIVATE_KEY"
          if [ -n "$missing" ]; then
            echo "::error::Missing GitHub secrets:$missing"
            exit 1
          fi

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: ${{ secrets.EC2_SSH_PORT || 22 }}
          envs: DEPLOY_PATH,EC2_USER_FOR_PATH,EC2_DOCKER_ENV
          script_stop: true
          script: |
            set -euo pipefail
            REPO="${DEPLOY_PATH:-/home/${EC2_USER_FOR_PATH}/document-intelligence-system}"
            if [ ! -d "$REPO" ]; then
              echo "::error::Deploy path does not exist on server: $REPO"
              echo "Create it with: git clone https://github.com/${{ github.repository }}.git $REPO"
              exit 1
            fi
            if [ ! -d "$REPO/.git" ]; then
              echo "::error::Not a git repository (no .git): $REPO"
              echo "The workflow needs git pull. On EC2 run once:"
              echo "  rm -rf \"$REPO\"   # only if safe — removes non-git copy"
              echo "  git clone https://github.com/${{ github.repository }}.git \"$REPO\""
              echo "Or set secret EC2_DEPLOY_PATH to your actual clone path."
              exit 1
            fi
            cd "$REPO"
            BRANCH="${{ github.ref_name }}"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"
            export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            if ! command -v docker >/dev/null 2>&1; then
              echo "::error::docker not installed on this server (SSH session cannot find it)."
              echo "SSH in once and run:"
              echo "  curl -fsSL https://get.docker.com | sudo sh"
              echo "  sudo usermod -aG docker \"\$USER\""
              echo "Then log out and back in (or reboot), verify: docker run --rm hello-world"
              echo "From repo you can also run: bash scripts/ec2-bootstrap.sh"
              exit 127
            fi
            if ! docker compose version >/dev/null 2>&1; then
              echo "::error::Docker Compose v2 plugin missing. On Ubuntu/Debian:"
              echo "  sudo apt-get update && sudo apt-get install -y docker-compose-plugin"
              exit 1
            fi
            cd docker
            if [ -n "${EC2_DOCKER_ENV:-}" ]; then
              umask 077
              printf '%s\n' "$EC2_DOCKER_ENV" > .env
            fi
            docker compose -f docker-compose.ec2.yml build --pull
            docker compose -f docker-compose.ec2.yml up -d --remove-orphans

      - name: Smoke test API (non-blocking)
        continue-on-error: true
        run: |
          sleep 8
          curl -sf --max-time 30 "http://${{ secrets.EC2_HOST }}:8000/health" | head -c 200
          echo
