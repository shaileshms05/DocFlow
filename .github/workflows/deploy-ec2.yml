# Deploy to EC2 after a quick verify step (same repo, push to main/master).
#
# Secrets (Settings → Secrets and variables → Actions):
#   EC2_HOST, EC2_USERNAME, EC2_SSH_PRIVATE_KEY  (required)
#   EC2_DEPLOY_PATH, EC2_SSH_PORT, EC2_DOCKER_ENV  (optional)
#
# EC2_DOCKER_ENV: multiline secret, e.g.
#   S3_OUTPUT_BUCKET=my-bucket
#   S3_INPUT_BUCKET=my-raw
#   AWS_REGION=us-east-1
# Written to $REPO/docker/.env before docker compose (chmod 600).

name: Deploy to EC2

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-ec2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt
      - run: pip install -r requirements.txt
      - run: PYTHONPATH=. python -m compileall -q .

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    env:
      DEPLOY_PATH: ${{ secrets.EC2_DEPLOY_PATH }}
      EC2_USER_FOR_PATH: ${{ secrets.EC2_USERNAME }}
      EC2_DOCKER_ENV: ${{ secrets.EC2_DOCKER_ENV }}

    steps:
      - name: Check required secrets
        run: |
          missing=
          [ -z "${{ secrets.EC2_HOST }}" ] && missing="$missing EC2_HOST"
          [ -z "${{ secrets.EC2_USERNAME }}" ] && missing="$missing EC2_USERNAME"
          [ -z "${{ secrets.EC2_SSH_PRIVATE_KEY }}" ] && missing="$missing EC2_SSH_PRIVATE_KEY"
          if [ -n "$missing" ]; then
            echo "::error::Missing GitHub secrets:$missing"
            exit 1
          fi

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: ${{ secrets.EC2_SSH_PORT || 22 }}
          envs: DEPLOY_PATH,EC2_USER_FOR_PATH,EC2_DOCKER_ENV
          script_stop: true
          script: |
            set -euo pipefail
            REPO="${DEPLOY_PATH:-/home/${EC2_USER_FOR_PATH}/document-intelligence-system}"
            cd "$REPO"
            BRANCH="${{ github.ref_name }}"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"
            cd docker
            if [ -n "${EC2_DOCKER_ENV:-}" ]; then
              umask 077
              printf '%s\n' "$EC2_DOCKER_ENV" > .env
            fi
            docker compose -f docker-compose.ec2.yml build --pull
            docker compose -f docker-compose.ec2.yml up -d --remove-orphans

      - name: Smoke test API (non-blocking)
        continue-on-error: true
        run: |
          sleep 8
          curl -sf --max-time 30 "http://${{ secrets.EC2_HOST }}:8000/health" | head -c 200
          echo
