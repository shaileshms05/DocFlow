# EC2: internal Kafka only; API on :8000; MLflow on 127.0.0.1:5000.
# No Postgres — set S3_BUCKET (+ AWS_REGION) for one-bucket layout: raw/, processed/, ingest/, feedback/
#
#   docker compose -f docker-compose.ec2.yml up -d --build

name: document-intelligence

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/2181 && echo ruok >&3 && head -1 <&3 | grep -q imok'"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server 127.0.0.1:29092 || exit 1"]
      interval: 5s
      timeout: 15s
      retries: 30
      start_period: 45s

  mlflow:
    image: python:3.11-slim
    ports:
      - "127.0.0.1:5000:5000"
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        pip install --no-cache-dir -q mlflow==2.10.2 &&
        exec mlflow server --host 0.0.0.0 --port 5000 \
          --backend-store-uri sqlite:////mlflow/mlflow.db \
          --default-artifact-root file:///mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MLFLOW_TRACKING_URI: http://mlflow:5000
      DATA_DIR: /data
      AWS_REGION: ${AWS_REGION:-}
      S3_BUCKET: ${S3_BUCKET:-}
    volumes:
      - app_data:/data
    restart: unless-stopped

  consumer:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["python", "-m", "streaming.spark_job", "--local-consumer"]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MLFLOW_TRACKING_URI: http://mlflow:5000
      DATA_DIR: /data
      AWS_REGION: ${AWS_REGION:-}
      S3_BUCKET: ${S3_BUCKET:-}
    volumes:
      - app_data:/data
    restart: unless-stopped

volumes:
  mlflow_data:
  app_data:
