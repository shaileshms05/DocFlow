# Full stack in Docker (from this folder):
#   docker compose up --build
# API :8000 · MLflow :5000 · Kafka :9092 (host)
# No Postgres — set S3_BUCKET (+ AWS_REGION) for S3, or use local /data volume.
# For a public EC2 host, use docker-compose.ec2.yml.

name: document-intelligence

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server 127.0.0.1:29092 || exit 1"]
      interval: 5s
      timeout: 15s
      retries: 30
      start_period: 45s

  mlflow:
    image: python:3.11-slim
    ports:
      - "5000:5000"
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        pip install --no-cache-dir -q mlflow==2.10.2 &&
        exec mlflow server --host 0.0.0.0 --port 5000 \
          --backend-store-uri sqlite:////mlflow/mlflow.db \
          --default-artifact-root file:///mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MLFLOW_TRACKING_URI: http://mlflow:5000
      DATA_DIR: /data
      AWS_REGION: ${AWS_REGION:-}
      S3_BUCKET: ${S3_BUCKET:-}
    volumes:
      - app_data:/data
    restart: unless-stopped

  consumer:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["python", "-m", "streaming.spark_job", "--local-consumer"]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MLFLOW_TRACKING_URI: http://mlflow:5000
      DATA_DIR: /data
      AWS_REGION: ${AWS_REGION:-}
      S3_BUCKET: ${S3_BUCKET:-}
    volumes:
      - app_data:/data
    restart: unless-stopped

volumes:
  mlflow_data:
  app_data:
